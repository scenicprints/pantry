name: pantry
description: "Pantry inventory & cost tracker — scans groceries and syncs a JSON pantry to GitHub for the AI chef to read."
publish_to: 'none'

# Version is the single source of truth for the app's version.
# publish.ps1 bumps this; the in-app updater compares it to the latest
# GitHub Release. (Mirrors the BodyComp pipeline.)
version: 0.4.1+6

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # GitHub sync + in-app OTA updater
  http: ^1.2.2               # Open Food Facts + GitHub Contents/Releases API
  package_info_plus: ^8.1.0  # read the installed app version
  ota_update: ^7.0.0         # download + install a newer APK

  # Scanning
  mobile_scanner: ^7.2.0                   # barcode scanning via the camera
  image_picker: ^1.1.2                     # capture a Nutrition Facts photo
  google_mlkit_text_recognition: ^0.13.0   # on-device OCR of the label

  # AI Chef
  flutter_secure_storage: ^9.2.2   # store the Claude API key on-device (encrypted)
  google_fonts: ^6.2.1             # Fraunces / Inter / IBM Plex Mono (editorial UI)
  wakelock_plus: ^1.2.8            # keep the screen awake in Cooking Mode
  vibration: ^3.1.0               # buzz when a step timer hits zero

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1  # generates the launcher icon

# App launcher icon. Source art (green mason jar on the dark app bg) is
# produced by scratchpad/gen_icon.py → assets/icon/*.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/pantry_icon.png"
  adaptive_icon_background: "#0E0F12"
  adaptive_icon_foreground: "assets/icon/pantry_icon_fg.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
